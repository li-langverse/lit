name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: li-langverse/lic
          path: lic
          ref: main
      - uses: actions/checkout@v6
        with:
          repository: li-langverse/lip
          path: lip
          ref: main
      - name: Install LLVM 22 and build tools
        run: |
          chmod +x lic/scripts/ci-install-llvm.sh
          sudo LI_LLVM_MAJOR=22 bash lic/scripts/ci-install-llvm.sh
      - name: lit test + coverage gate
        env:
          LLVM_DIR: /usr/lib/llvm-22/lib/cmake/llvm
          CC: clang-22
          CXX: clang++-22
          LI_REPO: ${{ github.workspace }}/lic
        run: |
          chmod +x scripts/*.sh
          ./scripts/ci.sh
