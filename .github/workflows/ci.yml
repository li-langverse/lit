name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: li-langverse/lic
          path: lic
          # TODO: revert to main after li-langverse/lic#4 merges
          ref: fix/typecheck-ctx-init
      - uses: actions/checkout@v6
        with:
          repository: li-langverse/lip
          path: lip
          ref: main
      - name: Install LLVM 18
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-18 llvm-18-dev
      - name: lit test + coverage gate
        env:
          LLVM_DIR: /usr/lib/llvm-18/lib/cmake/llvm
          CC: clang-18
          CXX: clang++-18
          LI_REPO: ${{ github.workspace }}/lic
        run: |
          chmod +x scripts/*.sh
          ./scripts/ci.sh
