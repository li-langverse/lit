name: notify-downstream-lit
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        required: true
permissions:
  contents: read
jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify lip
        env:
          DISPATCH_PAT: ${{ secrets.LI_DOWNSTREAM_DISPATCH_TOKEN }}
          VERSION: ${{ github.event.release.tag_name || github.event.inputs.version }}
        run: |
          if [[ -n "$DISPATCH_PAT" ]]; then export GH_TOKEN="$DISPATCH_PAT"; else export GH_TOKEN="${{ github.token }}"; fi
          gh api repos/li-langverse/lip/dispatches -f event_type=lit-release \
            -f "client_payload[version]=${VERSION}" -f "client_payload[repo]=li-langverse/lit"
